<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="AndarKyaHai Logo">
  <rect width="64" height="64" rx="16" fill="#1d1d1f"/>
  <!-- Package outline -->
  <rect x="18" y="12" width="28" height="38" rx="4" fill="none" stroke="#ffffff" stroke-width="4" />
  <line x1="18" y1="22" x2="46" y2="22" stroke="#ffffff" stroke-width="4" />
  <!-- Cut-out mask using a filled circle of background color -->
  <circle cx="44" cy="44" r="11" fill="#1d1d1f" />
  <!-- Search lens circle -->
  <circle cx="44" cy="44" r="8" fill="none" stroke="#ffffff" stroke-width="4" />
  <!-- Search lens handle -->
  <line x1="50" y1="50" x2="57" y2="57" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
</svg>
